services:
  streamlit:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: streamlit-covid-dashboard
    ports:
      - "8501:8501"
    environment:
      - MONGO_USER=${MONGO_USER}
      - MONGO_PASSWORD=${MONGO_PASSWORD}
      - MONGO_HOST=${MONGO_HOST}
      - MONGO_DB=${MONGO_DB}
    env_file:
      - .env
    restart: unless-stopped
